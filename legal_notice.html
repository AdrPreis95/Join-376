<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width= , initial-scale=1.0">
    <title>Impressum</title>

    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/standard.css">
    <link rel="stylesheet" href="style/privacy_policy.css">
    <link rel="stylesheet" href="style/legal_notice.css">

<body>

            <div class="main-button-container">
                <button class="main-button">
                    <img src="./assets/icons/summary_icon.png" alt="summary_icon">

                </button>
                <button class="main-button">
                    <img src="./assets/icons/add_task_icon.png" alt="addtask_icon">

                <button class="main-button">

                </button>

                </button>
            </div>
            <div class="legal-button-container">
                <button class="legal-button">Privacy Policy</button>
                <button class="legal-button active_side">Legal notice</button>
            </div>
        </aside>

        <main class="main-content">
